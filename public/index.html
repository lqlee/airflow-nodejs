<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airflow Node</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    header { background: #1a1d27; border-bottom: 1px solid #2d3748; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; font-weight: 600; color: #63b3ed; }
    .workers-badge { font-size: 12px; background: #2d3748; padding: 3px 10px; border-radius: 12px; color: #a0aec0; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #718096; margin-bottom: 12px; }
    .dag-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .dag-card { background: #1a1d27; border: 1px solid #2d3748; border-radius: 8px; padding: 16px; transition: border-color .15s; }
    .dag-card.paused { border-color: #744210; background: #1a1812; }
    .dag-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .paused-badge { font-size: 10px; font-weight: 600; background: #744210; color: #fbd38d; padding: 1px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: .04em; }
    .dag-meta { font-size: 12px; color: #718096; margin-bottom: 12px; }
    .tasks-list { font-size: 12px; color: #a0aec0; margin-bottom: 12px; }
    .tasks-list span { background: #2d3748; padding: 2px 7px; border-radius: 4px; margin-right: 4px; display: inline-block; margin-bottom: 4px; }
    .btn { padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: #3182ce; color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-pause { background: #744210; color: #fbd38d; }
    .btn-resume { background: #1c4532; color: #68d391; }
    .runs-table { width: 100%; border-collapse: collapse; }
    .runs-table th { text-align: left; font-size: 12px; color: #718096; font-weight: 500; padding: 8px 12px; border-bottom: 1px solid #2d3748; }
    .runs-table td { padding: 10px 12px; border-bottom: 1px solid #1e2130; font-size: 13px; }
    .runs-table tr:hover td { background: #1e2130; }
    .badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-success   { background: #1c4532; color: #68d391; }
    .badge-failed    { background: #4a1515; color: #fc8181; }
    .badge-running   { background: #1a365d; color: #63b3ed; }
    .badge-queued    { background: #2d3748; color: #a0aec0; }
    .badge-cancelled { background: #2d2d2d; color: #718096; }
    .run-detail { margin-top: 24px; background: #1a1d27; border: 1px solid #2d3748; border-radius: 8px; padding: 20px; }
    .run-detail h3 { font-size: 14px; margin-bottom: 16px; }
    .task-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #1e2130; }
    .task-row:last-child { border-bottom: none; }
    .task-name { font-size: 13px; min-width: 140px; font-family: monospace; }
    .task-deps { font-size: 11px; color: #718096; flex: 1; }
    .duration { font-size: 11px; color: #718096; min-width: 60px; text-align: right; }
    .error-msg { font-size: 11px; color: #fc8181; margin-top: 4px; font-family: monospace; }
    .refresh-btn { background: none; border: 1px solid #2d3748; color: #718096; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .refresh-btn:hover { border-color: #4a5568; color: #a0aec0; }
    .empty { color: #4a5568; font-size: 13px; padding: 24px 0; text-align: center; }
    .dag-filter { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-btn { background: #2d3748; border: 1px solid #4a5568; color: #a0aec0; padding: 4px 12px; border-radius: 14px; cursor: pointer; font-size: 12px; }
    .filter-btn.active { background: #3182ce; border-color: #3182ce; color: #fff; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .split { grid-template-columns: 1fr; } }
    .log-panel { margin-top: 16px; background: #0d1117; border: 1px solid #2d3748; border-radius: 6px; }
    .log-panel-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid #2d3748; font-size: 12px; color: #718096; }
    .log-panel-header strong { color: #a0aec0; font-family: monospace; }
    .log-lines { padding: 10px 12px; max-height: 280px; overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.6; }
    .log-line { display: flex; gap: 12px; }
    .log-ts { color: #4a5568; white-space: nowrap; flex-shrink: 0; }
    .log-stdout { color: #e2e8f0; }
    .log-stderr { color: #fbb6ce; }
    .log-btn { background: none; border: 1px solid #2d3748; color: #718096; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    .log-btn:hover { border-color: #4a5568; color: #a0aec0; }
    .view-toggle { display:flex; gap:4px; background:#0f1117; border:1px solid #2d3748; border-radius:6px; padding:2px; }
    .view-toggle button { background:none; border:none; color:#718096; padding:3px 10px; border-radius:4px; cursor:pointer; font-size:11px; }
    .view-toggle button.active { background:#2d3748; color:#e2e8f0; }
    .xcom-panel { margin-top:12px; background:#0d1117; border:1px solid #2d3748; border-radius:6px; }
    .xcom-panel-header { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid #2d3748; font-size:12px; color:#718096; }
    .xcom-row { display:flex; align-items:baseline; gap:10px; padding:6px 12px; border-bottom:1px solid #1e2130; font-size:12px; font-family:monospace; }
    .xcom-row:last-child { border-bottom:none; }
    .xcom-task { color:#63b3ed; min-width:90px; flex-shrink:0; }
    .xcom-key { color:#fbd38d; min-width:80px; flex-shrink:0; }
    .xcom-val { color:#e2e8f0; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .xcom-ts { color:#4a5568; font-size:10px; flex-shrink:0; }
    .dag-graph-wrap { overflow-x:auto; margin-top:4px; }
    .dag-graph-wrap svg { display:block; }
    .dag-node { cursor:pointer; }
    .dag-node rect { rx:6; ry:6; stroke-width:2; }
    .dag-node text { font-family:monospace; font-size:11px; pointer-events:none; }
    .dag-node .dur { font-size:9px; fill:#718096; }
    .keys-panel { background: #1a1d27; border: 1px solid #2d3748; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
    .keys-panel h4 { font-size: 13px; color: #a0aec0; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .keys-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #2d3748; font-size: 12px; }
    .keys-row:last-child { border-bottom: none; }
    .key-name { font-weight: 600; min-width: 120px; color: #e2e8f0; }
    .key-meta { color: #718096; flex: 1; }
    .key-revoked { color: #4a5568; font-style: italic; }
    .key-new-val { font-family: monospace; font-size: 11px; color: #68d391; background: #0d1117; padding: 6px 10px; border-radius: 4px; word-break: break-all; margin-top: 8px; border: 1px solid #1c4532; }
    .sla-banner { background: #4a2008; border-bottom: 1px solid #c05621; padding: 8px 24px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #fbd38d; }
    .sla-banner strong { color: #f6ad55; }
    .sla-panel { background: #1a1d27; border: 1px solid #c05621; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
    .sla-panel h4 { font-size: 13px; color: #f6ad55; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .sla-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #2d3748; font-size: 12px; }
    .sla-row:last-child { border-bottom: none; }
    .sla-dag { font-family: monospace; color: #e2e8f0; min-width: 120px; }
    .sla-time { color: #718096; flex: 1; }
    .sla-acked { color: #4a5568; font-style: italic; }
    .stats-bar-wrap { display:flex; gap:4px; margin-bottom:16px; }
    .stats-bar-seg { height:8px; border-radius:4px; transition:width .3s; }
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px 16px; margin-bottom:12px; }
    .stats-kv { display:flex; flex-direction:column; gap:2px; }
    .stats-label { font-size:10px; color:#718096; text-transform:uppercase; letter-spacing:.06em; }
    .stats-value { font-size:18px; font-weight:700; color:#e2e8f0; font-family:monospace; }
    .stats-sub   { font-size:10px; color:#718096; }
    .stats-panel { background:#1a1d27; border:1px solid #2d3748; border-radius:8px; padding:16px; margin-bottom:16px; }
    .stats-panel h4 { font-size:12px; color:#718096; text-transform:uppercase; letter-spacing:.08em; margin-bottom:12px; }
  </style>
</head>
<body>
<div id="root"></div>
<style>
  .login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login-box { background:#1a1d27; border:1px solid #2d3748; border-radius:10px; padding:36px 32px; width:360px; }
  .login-box h2 { color:#63b3ed; margin-bottom:6px; font-size:20px; }
  .login-box p { color:#718096; font-size:13px; margin-bottom:24px; }
  .login-box input { width:100%; background:#0f1117; border:1px solid #4a5568; border-radius:6px; padding:10px 12px; color:#e2e8f0; font-size:13px; font-family:monospace; outline:none; }
  .login-box input:focus { border-color:#3182ce; }
  .login-box button { width:100%; margin-top:12px; }
  .login-error { color:#fc8181; font-size:12px; margin-top:8px; }
</style>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const BASE = '';
const LS_KEY = 'airflow_api_key';

// ── Auth-aware fetch ──────────────────────────────────────────────────
function apiFetch(url, options = {}) {
  const key = localStorage.getItem(LS_KEY) ?? '';
  return fetch(url, {
    ...options,
    headers: { ...(options.headers ?? {}), ...(key ? { Authorization: `Bearer ${key}` } : {}) },
  });
}

// ── Login screen ──────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [key, setKey] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (!key.trim()) return;
    setLoading(true);
    setError('');
    const res = await fetch(`${BASE}/dags`, {
      headers: { Authorization: `Bearer ${key.trim()}` }
    });
    setLoading(false);
    if (res.status === 401) { setError('Invalid API key'); return; }
    localStorage.setItem(LS_KEY, key.trim());
    onLogin();
  };

  return (
    <div className="login-wrap">
      <div className="login-box">
        <h2>✈ Airflow Node</h2>
        <p>Enter your API key to continue</p>
        <form onSubmit={submit}>
          <input type="password" placeholder="API key" value={key}
            onChange={e => setKey(e.target.value)} autoFocus />
          {error && <div className="login-error">{error}</div>}
          <button className="btn btn-primary" disabled={loading} style={{marginTop:12,width:'100%'}}>
            {loading ? 'Checking…' : 'Sign in'}
          </button>
        </form>
      </div>
    </div>
  );
}

const statusBadge = (state) => <span className={`badge badge-${state}`}>{state}</span>;

const duration = (start, end) => {
  if (!start) return '-';
  const ms = new Date(end ?? Date.now()) - new Date(start);
  return ms < 1000 ? `${ms}ms` : `${(ms/1000).toFixed(1)}s`;
};

function useInterval(fn, ms) {
  useEffect(() => {
    fn();
    const id = setInterval(fn, ms);
    return () => clearInterval(id);
  }, [fn, ms]);
}

// ── Health ────────────────────────────────────────────────────────────
function Health() {
  const [info, setInfo] = useState(null);
  const fetch_ = useCallback(() =>
    apiFetch(`${BASE}/health`).then(r => r.json()).then(setInfo).catch(()=>{}), []);
  useInterval(fetch_, 3000);
  if (!info) return null;
  return (
    <span className="workers-badge">
      workers: {info.workers?.active ?? 0} active · {info.workers?.queued ?? 0} waiting
    </span>
  );
}

// ── API Keys Panel ────────────────────────────────────────────────────
function ApiKeysPanel({ onClose }) {
  const [keys, setKeys] = useState([]);
  const [name, setName] = useState('');
  const [creating, setCreating] = useState(false);
  const [newKey, setNewKey] = useState(null);  // shown once

  const fetchKeys = useCallback(() =>
    apiFetch(`${BASE}/api-keys`).then(r => r.json()).then(data => {
      if (Array.isArray(data)) setKeys(data);
    }).catch(() => {}), []);

  useEffect(() => { fetchKeys(); }, []);

  const create = async (e) => {
    e.preventDefault();
    if (!name.trim()) return;
    setCreating(true);
    const res = await apiFetch(`${BASE}/api-keys`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim() }),
    });
    const data = await res.json();
    setCreating(false);
    if (res.ok) {
      setNewKey(data.key);
      setName('');
      fetchKeys();
    }
  };

  const revoke = async (id) => {
    await apiFetch(`${BASE}/api-keys/${id}`, { method: 'DELETE' });
    fetchKeys();
  };

  const fmtDate = d => d ? new Date(d).toLocaleDateString() : '—';

  return (
    <div className="keys-panel">
      <h4>
        🔑 API Keys
        <span style={{flex:1}} />
        <button className="log-btn" onClick={onClose}>✕</button>
      </h4>
      <form onSubmit={create} style={{display:'flex',gap:8,marginBottom:16}}>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="Key name (e.g. ci-bot)"
          style={{flex:1,background:'#0f1117',border:'1px solid #4a5568',borderRadius:4,padding:'5px 10px',color:'#e2e8f0',fontSize:12}} />
        <button type="submit" className="btn btn-primary btn-sm" disabled={creating || !name.trim()}>
          {creating ? '…' : '+ Create'}
        </button>
      </form>
      {newKey && (
        <div>
          <div style={{fontSize:11,color:'#68d391',marginBottom:4}}>✓ Key created — copy it now, it won't be shown again:</div>
          <div className="key-new-val">{newKey}</div>
          <button className="log-btn" style={{marginTop:6}} onClick={() => setNewKey(null)}>Dismiss</button>
        </div>
      )}
      {keys.length === 0 && !newKey && <div className="empty" style={{padding:'12px 0'}}>No API keys yet</div>}
      {keys.map(k => (
        <div key={k.id} className="keys-row">
          <span className="key-name">{k.name}</span>
          <span className="key-meta">created {fmtDate(k.created_at)} · last used {fmtDate(k.last_used_at)}</span>
          {k.revoked
            ? <span className="key-revoked">revoked</span>
            : <button className="log-btn" style={{color:'#fc8181',borderColor:'#4a1515'}}
                onClick={() => { if (confirm(`Revoke key "${k.name}"?`)) revoke(k.id); }}>Revoke</button>
          }
        </div>
      ))}
    </div>
  );
}

// ── SLA Alerts ────────────────────────────────────────────────────────
function useSlaAlerts() {
  const [alerts, setAlerts] = useState([]);
  const fetch_ = useCallback(() =>
    apiFetch(`${BASE}/sla-alerts`).then(r => r.json()).then(data => {
      if (Array.isArray(data)) setAlerts(data);
    }).catch(() => {}), []);
  useInterval(fetch_, 10000);
  const refresh = fetch_;
  return { alerts, refresh };
}

function SlaBanner({ alerts, onViewAlerts }) {
  const unacked = alerts.filter(a => !a.acked);
  if (!unacked.length) return null;
  return (
    <div className="sla-banner">
      <span>⚠️</span>
      <strong>{unacked.length} SLA breach{unacked.length > 1 ? 'es' : ''}</strong>
      <span>— one or more runs exceeded their deadline.</span>
      <button className="refresh-btn" style={{marginLeft:'auto',borderColor:'#c05621',color:'#f6ad55'}}
        onClick={onViewAlerts}>View alerts</button>
    </div>
  );
}

function SlaPanel({ alerts, onAck, onClose }) {
  const fmt = ms => ms < 60000 ? `${(ms/1000).toFixed(1)}s` : `${(ms/60000).toFixed(1)}m`;
  return (
    <div className="sla-panel">
      <h4>
        ⚠️ SLA Alerts
        <span style={{flex:1}} />
        <button className="log-btn" onClick={onClose}>✕</button>
      </h4>
      {alerts.length === 0 && <div className="empty" style={{padding:'12px 0'}}>No alerts</div>}
      {alerts.map(a => (
        <div key={a.id} className="sla-row">
          <span className="sla-dag">{a.dag_id}</span>
          <span className="sla-time">
            run <code style={{fontSize:11}}>{a.dag_run_id.slice(-8)}</code>
            {' · '}elapsed {fmt(a.elapsed_ms)} / SLA {fmt(a.sla_ms)}
            {' · '}{new Date(a.fired_at).toLocaleTimeString()}
          </span>
          {a.acked
            ? <span className="sla-acked">acked</span>
            : <button className="log-btn" style={{color:'#f6ad55',borderColor:'#c05621'}}
                onClick={() => onAck(a.id)}>Ack</button>
          }
        </div>
      ))}
    </div>
  );
}

// ── Dag Cards ─────────────────────────────────────────────────────────
function DagCard({ dag, onTrigger, onSelect, onTogglePause, selected }) {
  const [triggering, setTriggering] = useState(false);
  const [toggling, setToggling] = useState(false);

  const trigger = async () => {
    setTriggering(true);
    await apiFetch(`${BASE}/dags/${dag.id}/trigger`, { method: 'POST' });
    setTriggering(false);
    onTrigger();
  };

  const togglePause = async () => {
    setToggling(true);
    const action = dag.is_paused ? 'resume' : 'pause';
    await apiFetch(`${BASE}/dags/${dag.id}/${action}`, { method: 'POST' });
    setToggling(false);
    onTogglePause();
  };

  return (
    <div className={`dag-card${dag.is_paused ? ' paused' : ''}`}
      style={{ borderColor: selected && !dag.is_paused ? '#3182ce' : undefined }}>
      <h3>
        {dag.id}
        {dag.is_paused && <span className="paused-badge">paused</span>}
      </h3>
      <div className="dag-meta">
        {dag.schedule ? `⏰ ${dag.schedule}` : '● manual only'}
      </div>
      <div className="tasks-list">
        {dag.tasks.map(t => <span key={t}>{t}</span>)}
      </div>
      <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
        <button className="btn btn-primary btn-sm" onClick={trigger} disabled={triggering}>
          {triggering ? '…' : '▶ Trigger'}
        </button>
        <button className={`btn btn-sm ${dag.is_paused ? 'btn-resume' : 'btn-pause'}`}
          onClick={togglePause} disabled={toggling}>
          {toggling ? '…' : dag.is_paused ? '▶ Resume' : '⏸ Pause'}
        </button>
        <button className="btn btn-sm" style={{background:'#2d3748',color:'#a0aec0'}}
          onClick={() => onSelect(dag.id)}>
          {selected ? 'Hide runs' : 'View runs'}
        </button>
      </div>
    </div>
  );
}

// ── Log Panel ─────────────────────────────────────────────────────────
function LogPanel({ runId, taskId, onClose }) {
  const [lines, setLines] = useState([]);
  const fetch_ = useCallback(() =>
    apiFetch(`${BASE}/dag-runs/${runId}/tasks/${taskId}/logs`)
      .then(r => r.json()).then(setLines).catch(() => {}), [runId, taskId]);
  useInterval(fetch_, 2000);
  const fmt = ts => new Date(ts).toLocaleTimeString('en', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  return (
    <div className="log-panel">
      <div className="log-panel-header">
        <strong>{taskId}</strong> logs
        <span style={{flex:1}} />
        <button className="log-btn" onClick={fetch_}>↻</button>
        <button className="log-btn" onClick={onClose}>✕</button>
      </div>
      <div className="log-lines">
        {lines.length === 0 && <span style={{color:'#4a5568'}}>No logs yet</span>}
        {lines.map((l, i) => (
          <div key={i} className="log-line">
            <span className="log-ts">{fmt(l.ts)}</span>
            <span className={l.stream === 'stderr' ? 'log-stderr' : 'log-stdout'}>{l.line}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── DAG Graph ─────────────────────────────────────────────────────────
// Pure SVG graph, no external library.
// Layout: topological layers left-to-right, nodes sorted within each layer.

const STATE_COLORS = {
  success:   { fill: '#1c4532', stroke: '#68d391', text: '#68d391' },
  failed:    { fill: '#4a1515', stroke: '#fc8181', text: '#fc8181' },
  running:   { fill: '#1a365d', stroke: '#63b3ed', text: '#63b3ed' },
  queued:    { fill: '#1e2130', stroke: '#4a5568', text: '#a0aec0' },
  cancelled: { fill: '#1a1a1a', stroke: '#4a5568', text: '#718096' },
};

function topoLayers(tasks) {
  // tasks: [{ task_id, depends_on, ... }]
  const byId = Object.fromEntries(tasks.map(t => [t.task_id, t]));
  const layers = [];
  const assigned = {};

  // Kahn's algorithm
  const inDeg = {};
  tasks.forEach(t => { inDeg[t.task_id] = 0; });
  tasks.forEach(t => t.depends_on?.forEach(dep => { inDeg[t.task_id] = (inDeg[t.task_id] || 0) + 1; }));

  let queue = tasks.filter(t => (inDeg[t.task_id] || 0) === 0).map(t => t.task_id);
  while (queue.length) {
    layers.push([...queue]);
    queue.forEach(id => { assigned[id] = layers.length - 1; });
    const next = [];
    queue.forEach(id => {
      tasks.forEach(t => {
        if (t.depends_on?.includes(id)) {
          inDeg[t.task_id]--;
          if (inDeg[t.task_id] === 0) next.push(t.task_id);
        }
      });
    });
    queue = next;
  }
  // Any remaining (cycles / unresolved) go in last layer
  tasks.forEach(t => {
    if (assigned[t.task_id] === undefined) layers.push([t.task_id]);
  });

  return layers;
}

// Group colours — cycle through a palette by group index
const GROUP_PALETTE = ['#1a2744','#1a2f1a','#2f1a2f','#2f2a1a','#1a2f2f','#2a1a1f'];
const GROUP_LABEL_COLOR = ['#90cdf4','#68d391','#d6bcfa','#f6ad55','#81e6d9','#fc8181'];

function DagGraph({ tasks, onClickTask }) {
  const NODE_W = 130, NODE_H = 44, GAP_X = 70, GAP_Y = 16, PAD = 20;
  const GROUP_PAD = 10, GROUP_LABEL_H = 16;

  const layers = topoLayers(tasks);

  // Assign positions
  const pos = {};
  layers.forEach((layer, col) => {
    const totalH = layer.length * NODE_H + (layer.length - 1) * GAP_Y;
    layer.forEach((id, row) => {
      pos[id] = {
        x: PAD + col * (NODE_W + GAP_X),
        y: PAD + GROUP_LABEL_H + row * (NODE_H + GAP_Y) + (layers.reduce((m, l) => Math.max(m, l.length), 0) * (NODE_H + GAP_Y) - totalH) / 2,
      };
    });
  });

  const svgW = PAD * 2 + layers.length * NODE_W + (layers.length - 1) * GAP_X;
  const maxRows = layers.reduce((m, l) => Math.max(m, l.length), 0);
  const svgH = PAD * 2 + GROUP_LABEL_H + maxRows * NODE_H + (maxRows - 1) * GAP_Y;

  const dur = (t) => {
    if (!t.started_at) return '';
    const ms = new Date(t.ended_at ?? Date.now()) - new Date(t.started_at);
    return ms < 1000 ? `${ms}ms` : `${(ms/1000).toFixed(1)}s`;
  };

  // Compute group bounding boxes for background rects
  const groups = {};
  tasks.forEach(t => {
    if (!t.group_id) return;
    const p = pos[t.task_id];
    if (!p) return;
    if (!groups[t.group_id]) groups[t.group_id] = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
    const g = groups[t.group_id];
    g.minX = Math.min(g.minX, p.x);
    g.minY = Math.min(g.minY, p.y);
    g.maxX = Math.max(g.maxX, p.x + NODE_W);
    g.maxY = Math.max(g.maxY, p.y + NODE_H);
  });
  const groupIds = Object.keys(groups);

  return (
    <div className="dag-graph-wrap">
      <svg width={svgW} height={svgH} style={{minWidth: svgW}}>
        <defs>
          <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 Z" fill="#4a5568" />
          </marker>
        </defs>
        {/* Group background rects (drawn before edges/nodes) */}
        {groupIds.map((gid, i) => {
          const { minX, minY, maxX, maxY } = groups[gid];
          const rx = minX - GROUP_PAD, ry = minY - GROUP_LABEL_H - GROUP_PAD;
          const rw = maxX - minX + GROUP_PAD * 2, rh = maxY - minY + GROUP_LABEL_H + GROUP_PAD * 2;
          const fill = GROUP_PALETTE[i % GROUP_PALETTE.length];
          const labelColor = GROUP_LABEL_COLOR[i % GROUP_LABEL_COLOR.length];
          return (
            <g key={gid}>
              <rect x={rx} y={ry} width={rw} height={rh}
                fill={fill} stroke={labelColor} strokeWidth="1" rx="8" ry="8" opacity="0.6" />
              <text x={rx + 8} y={ry + 12} fill={labelColor} fontSize="10" fontFamily="monospace">{gid}</text>
            </g>
          );
        })}
        {/* Edges */}
        {tasks.map(t =>
          (t.depends_on ?? []).map(dep => {
            if (!pos[dep] || !pos[t.task_id]) return null;
            const x1 = pos[dep].x + NODE_W, y1 = pos[dep].y + NODE_H / 2;
            const x2 = pos[t.task_id].x,   y2 = pos[t.task_id].y + NODE_H / 2;
            const cx = (x1 + x2) / 2;
            return (
              <path key={`${dep}->${t.task_id}`}
                d={`M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`}
                fill="none" stroke="#4a5568" strokeWidth="1.5" markerEnd="url(#arr)" />
            );
          })
        )}
        {/* Nodes */}
        {tasks.map(t => {
          const { x, y } = pos[t.task_id] ?? { x: 0, y: 0 };
          const c = STATE_COLORS[t.state] ?? STATE_COLORS.queued;
          const d = dur(t);
          return (
            <g key={t.task_id} className="dag-node" onClick={() => onClickTask(t.task_id)}
              transform={`translate(${x},${y})`}>
              <rect width={NODE_W} height={NODE_H} fill={c.fill} stroke={c.stroke} rx="6" ry="6" />
              <text x={NODE_W/2} y={d ? 17 : NODE_H/2 + 4} textAnchor="middle" fill={c.text}>
                {t.task_id.length > 14 ? t.task_id.slice(0, 13) + '…' : t.task_id}
              </text>
              {d && <text className="dur" x={NODE_W/2} y={30} textAnchor="middle">{d}</text>}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

// ── XCom Panel ───────────────────────────────────────────────────────
function XComPanel({ runId }) {
  const [xcoms, setXcoms] = useState([]);
  const fetch_ = useCallback(() =>
    apiFetch(`${BASE}/dag-runs/${runId}/xcoms`)
      .then(r => r.json())
      .then(data => { if (Array.isArray(data)) setXcoms(data); })
      .catch(() => {}), [runId]);
  useInterval(fetch_, 3000);

  const fmt = ts => new Date(ts).toLocaleTimeString('en', { hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const fmtVal = v => {
    if (v === null || v === undefined) return 'null';
    if (typeof v === 'object') {
      try { return JSON.stringify(v); } catch { return String(v); }
    }
    return String(v);
  };

  return (
    <div className="xcom-panel">
      <div className="xcom-panel-header">
        <span>XCom values</span>
        <span style={{marginLeft:'auto',fontSize:11}}>{xcoms.length} entr{xcoms.length === 1 ? 'y' : 'ies'}</span>
        <button className="log-btn" onClick={fetch_}>↻</button>
      </div>
      {xcoms.length === 0
        ? <div style={{padding:'10px 12px',color:'#4a5568',fontSize:12}}>No XCom values yet</div>
        : xcoms.map((x, i) => (
          <div key={i} className="xcom-row">
            <span className="xcom-task">{x.task_id}</span>
            <span className="xcom-key">{x.key}</span>
            <span className="xcom-val" title={fmtVal(x.value)}>{fmtVal(x.value)}</span>
            <span className="xcom-ts">{fmt(x.pushed_at)}</span>
          </div>
        ))
      }
    </div>
  );
}

// ── Run Detail ────────────────────────────────────────────────────────
function RunDetail({ runId, onClose }) {
  const [run, setRun] = useState(null);
  const [logTask, setLogTask] = useState(null);
  const [cancelling, setCancelling] = useState(false);
  const [view, setView] = useState('graph');  // 'graph' | 'list'

  const fetch_ = useCallback(() =>
    apiFetch(`${BASE}/dag-runs/${runId}`).then(r=>r.json()).then(setRun).catch(()=>{}), [runId]);
  useInterval(fetch_, 2000);

  const cancel = async () => {
    setCancelling(true);
    await apiFetch(`${BASE}/dag-runs/${runId}/cancel`, { method: 'POST' });
    setCancelling(false);
    fetch_();
  };

  const isActive = run && (run.state === 'queued' || run.state === 'running');

  if (!run) return <div className="run-detail"><div className="empty">Loading…</div></div>;
  return (
    <div className="run-detail">
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        <h3 style={{flex:1,marginBottom:0}}>Run: <code style={{fontSize:12}}>{runId.slice(-8)}</code></h3>
        {statusBadge(run.state)}
        {run.dag_version && (
          <span title={`Dag version: ${run.dag_version}`}
            style={{fontSize:10,fontFamily:'monospace',color:'#718096',background:'#1e2130',padding:'2px 6px',borderRadius:4}}>
            v{run.dag_version}
          </span>
        )}
        {run.logical_date && (
          <span title="Backfill logical date"
            style={{fontSize:10,fontFamily:'monospace',color:'#90cdf4',background:'#1a2744',padding:'2px 6px',borderRadius:4}}>
            ⏮ {new Date(run.logical_date).toISOString().slice(0,10)}
          </span>
        )}
        <div className="view-toggle">
          <button className={view==='graph'?'active':''} onClick={() => setView('graph')}>⬡ Graph</button>
          <button className={view==='list' ?'active':''} onClick={() => setView('list')}>≡ List</button>
          <button className={view==='xcom' ?'active':''} onClick={() => setView('xcom')}>⇄ XCom</button>
        </div>
        {isActive && (
          <button className="btn btn-sm" disabled={cancelling}
            style={{background:'#4a1515',color:'#fc8181'}} onClick={cancel}>
            {cancelling ? '…' : '⏹ Cancel'}
          </button>
        )}
        <button className="refresh-btn" onClick={fetch_}>↻</button>
        <button className="refresh-btn" onClick={onClose}>✕</button>
      </div>

      {view === 'graph' && (
        <>
          <DagGraph tasks={run.tasks}
            onClickTask={id => setLogTask(prev => prev === id ? null : id)} />
          {logTask && (
            <LogPanel runId={runId} taskId={logTask} onClose={() => setLogTask(null)} />
          )}
          {run.tasks.find(t => t.task_id === logTask)?.error && (
            <div className="error-msg" style={{marginTop:4}}>
              {run.tasks.find(t => t.task_id === logTask).error}
            </div>
          )}
        </>
      )}

      {view === 'xcom' && <XComPanel runId={runId} />}

      {view === 'list' && (() => {
        // Group tasks by group_id for display; ungrouped tasks shown inline
        const grouped = {};
        const ungrouped = [];
        run.tasks.forEach(t => {
          if (t.group_id) { (grouped[t.group_id] = grouped[t.group_id] || []).push(t); }
          else ungrouped.push(t);
        });
        const renderTask = (t) => (
          <div key={t.task_id}>
            <div className="task-row">
              <span className="task-name">{t.task_id}</span>
              {statusBadge(t.state)}
              {t.depends_on?.length > 0 &&
                <span className="task-deps">← {t.depends_on.join(', ')}</span>}
              <span className="duration">{duration(t.started_at, t.ended_at)}</span>
              <button className="log-btn"
                onClick={() => setLogTask(prev => prev === t.task_id ? null : t.task_id)}>
                {logTask === t.task_id ? 'hide logs' : 'logs'}
              </button>
            </div>
            {t.error && <div className="error-msg" style={{padding:'4px 0 4px 140px'}}>{t.error}</div>}
            {logTask === t.task_id &&
              <LogPanel runId={runId} taskId={t.task_id} onClose={() => setLogTask(null)} />}
          </div>
        );
        return (
          <>
            {Object.entries(grouped).map(([gid, gtasks]) => (
              <div key={gid} style={{border:'1px solid #2d3748',borderRadius:6,marginBottom:8,padding:'4px 8px'}}>
                <div style={{fontSize:10,fontFamily:'monospace',color:'#90cdf4',marginBottom:4,paddingBottom:4,borderBottom:'1px solid #2d3748'}}>
                  ▤ {gid}
                </div>
                {gtasks.map(renderTask)}
              </div>
            ))}
            {ungrouped.map(renderTask)}
          </>
        );
      })()}
    </div>
  );
}

// ── Runs Table ────────────────────────────────────────────────────────
function RunsTable({ dagId, onSelectRun }) {
  const [runs, setRuns] = useState([]);
  const [nextCursor, setNextCursor] = useState(null);
  const [loadingMore, setLoadingMore] = useState(false);

  const fetchPage = useCallback((cursor = null, replace = true) => {
    const url = `${BASE}/dags/${dagId}/runs?limit=20${cursor ? `&cursor=${cursor}` : ''}`;
    return apiFetch(url).then(r => r.json()).then(data => {
      setRuns(prev => replace ? (data.items ?? []) : [...prev, ...(data.items ?? [])]);
      setNextCursor(data.next_cursor ?? null);
    }).catch(() => {});
  }, [dagId]);

  // Poll first page every 3s (replaces current view to show new runs)
  useInterval(() => fetchPage(null, true), 3000);

  const loadMore = async () => {
    if (!nextCursor) return;
    setLoadingMore(true);
    await fetchPage(nextCursor, false);
    setLoadingMore(false);
  };

  if (!runs.length) return <div className="empty">No runs yet</div>;
  return (
    <>
      <table className="runs-table">
        <thead><tr>
          <th>Run ID</th><th>State</th><th>Version</th><th>Logical Date</th><th>Created</th><th></th>
        </tr></thead>
        <tbody>
          {runs.map(r => (
            <tr key={r.run_id}>
              <td><code style={{fontSize:12}}>{r.run_id.slice(-8)}</code></td>
              <td>{statusBadge(r.state)}</td>
              <td><code style={{fontSize:10,color:'#718096'}}>{r.dag_version ?? '—'}</code></td>
              <td style={{color:'#90cdf4',fontSize:11}}>
                {r.logical_date ? new Date(r.logical_date).toISOString().slice(0,10) : '—'}
              </td>
              <td style={{color:'#718096'}}>{new Date(r.created_at).toLocaleTimeString()}</td>
              <td><button className="refresh-btn" onClick={() => onSelectRun(r.run_id)}>detail →</button></td>
            </tr>
          ))}
        </tbody>
      </table>
      {nextCursor && (
        <div style={{textAlign:'center', marginTop:8}}>
          <button className="refresh-btn" onClick={loadMore} disabled={loadingMore}>
            {loadingMore ? '…' : 'Load more ↓'}
          </button>
        </div>
      )}
    </>
  );
}

// ── Stats Panel ───────────────────────────────────────────────────────
function fmtMs(ms) {
  if (ms == null) return '—';
  if (ms < 1000) return `${ms}ms`;
  if (ms < 60000) return `${(ms/1000).toFixed(1)}s`;
  return `${Math.floor(ms/60000)}m ${Math.round((ms%60000)/1000)}s`;
}

function StatsPanel({ dagId }) {
  const [stats, setStats] = useState(null);
  const fetch_ = useCallback(() =>
    apiFetch(`${BASE}/dags/${dagId}/stats?limit=50`)
      .then(r => r.json()).then(setStats).catch(() => {}),
    [dagId]);

  useEffect(() => { fetch_(); }, [fetch_]);

  if (!stats) return null;

  const terminal = stats.success_count + stats.failed_count + stats.cancelled_count;
  const running  = stats.total_runs - terminal;
  const rate     = stats.success_rate;

  // Bar segments: success=green, failed=red, cancelled=grey, running=blue
  const seg = (count, color, title) => {
    if (!count) return null;
    const pct = (count / stats.total_runs * 100).toFixed(1);
    return <div key={color} className="stats-bar-seg" title={`${title}: ${count}`}
      style={{width:`${pct}%`, background:color}} />;
  };

  return (
    <div className="stats-panel">
      <h4>📊 Last {stats.total_runs} runs</h4>

      {stats.total_runs > 0 && (
        <div className="stats-bar-wrap">
          {seg(stats.success_count,   '#276749', 'Success')}
          {seg(stats.failed_count,    '#9b1c1c', 'Failed')}
          {seg(stats.cancelled_count, '#4a5568', 'Cancelled')}
          {seg(running,               '#1a365d', 'Active')}
        </div>
      )}

      <div className="stats-grid">
        <div className="stats-kv">
          <span className="stats-label">Success rate</span>
          <span className="stats-value"
            style={{color: rate == null ? '#718096' : rate >= .9 ? '#68d391' : rate >= .5 ? '#f6ad55' : '#fc8181'}}>
            {rate == null ? '—' : `${(rate*100).toFixed(0)}%`}
          </span>
          <span className="stats-sub">{stats.success_count}✓ {stats.failed_count}✗ {stats.cancelled_count}⊘</span>
        </div>
        <div className="stats-kv">
          <span className="stats-label">Avg duration</span>
          <span className="stats-value">{fmtMs(stats.avg_duration_ms)}</span>
        </div>
        <div className="stats-kv">
          <span className="stats-label">p95 duration</span>
          <span className="stats-value">{fmtMs(stats.p95_duration_ms)}</span>
        </div>
        <div className="stats-kv">
          <span className="stats-label">Min / Max</span>
          <span className="stats-value" style={{fontSize:13}}>{fmtMs(stats.min_duration_ms)} / {fmtMs(stats.max_duration_ms)}</span>
        </div>
      </div>
    </div>
  );
}

// ── Backfill Panel ────────────────────────────────────────────────────
function BackfillPanel({ dagId, hasSchedule }) {
  const [open, setOpen] = useState(false);
  const [start, setStart] = useState('');
  const [end, setEnd] = useState('');
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  if (!hasSchedule) return null;

  const submit = async () => {
    setError(''); setResult(null); setLoading(true);
    try {
      const res = await apiFetch(`${BASE}/dags/${dagId}/backfill`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ start, end }),
      });
      const body = await res.json();
      if (!res.ok) { setError(body.error ?? 'Request failed'); }
      else { setResult(body); }
    } catch (e) { setError(String(e)); }
    finally { setLoading(false); }
  };

  return (
    <div style={{marginBottom:12}}>
      <button className="btn btn-sm" onClick={() => { setOpen(v => !v); setResult(null); setError(''); }}
        style={{background:'#1a2744',color:'#90cdf4',border:'1px solid #2d4a8a'}}>
        ⏮ Backfill
      </button>
      {open && (
        <div style={{marginTop:8,padding:12,background:'#1a2130',borderRadius:6,border:'1px solid #2d3748',display:'flex',flexWrap:'wrap',gap:8,alignItems:'flex-end'}}>
          <label style={{fontSize:12,color:'#a0aec0'}}>Start
            <input type="date" value={start} onChange={e => setStart(e.target.value)}
              style={{display:'block',marginTop:2,background:'#2d3748',color:'#e2e8f0',border:'none',borderRadius:4,padding:'4px 8px',fontSize:12}} />
          </label>
          <label style={{fontSize:12,color:'#a0aec0'}}>End
            <input type="date" value={end} onChange={e => setEnd(e.target.value)}
              style={{display:'block',marginTop:2,background:'#2d3748',color:'#e2e8f0',border:'none',borderRadius:4,padding:'4px 8px',fontSize:12}} />
          </label>
          <button className="btn btn-sm" disabled={!start || !end || loading} onClick={submit}>
            {loading ? '…' : 'Run backfill'}
          </button>
          {error && <span style={{fontSize:12,color:'#fc8181'}}>{error}</span>}
          {result && (
            <span style={{fontSize:12,color:'#68d391'}}>
              ✓ {result.created_count} runs created, {result.skipped} skipped ({result.total_dates} dates)
            </span>
          )}
        </div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────
function App() {
  const [dags, setDags] = useState([]);
  const [selectedDag, setSelectedDag] = useState(null);
  const [selectedRun, setSelectedRun] = useState(null);
  const [showAlerts, setShowAlerts] = useState(false);
  const [showKeys, setShowKeys] = useState(false);
  // null = not checked yet, true = authenticated, false = needs login
  const [authed, setAuthed] = useState(null);

  const { alerts, refresh: refreshAlerts } = useSlaAlerts();

  // On mount: check if auth is required and whether we have a valid key
  useEffect(() => {
    apiFetch(`${BASE}/health`).then(r => r.json()).then(info => {
      if (!info.auth) { setAuthed(true); return; }
      const key = localStorage.getItem(LS_KEY);
      if (!key) { setAuthed(false); return; }
      apiFetch(`${BASE}/dags`).then(r => {
        setAuthed(r.status !== 401);
      }).catch(() => setAuthed(false));
    }).catch(() => setAuthed(true));
  }, []);

  const handleLogin = () => setAuthed(true);
  const handleLogout = () => { localStorage.removeItem(LS_KEY); setAuthed(false); };

  const fetchDags = useCallback(() =>
    apiFetch(`${BASE}/dags`).then(r=>r.json()).then(setDags).catch(()=>{}), []);

  useInterval(fetchDags, 5000);

  const handleTrigger = () => { if (selectedDag) fetchDags(); };
  const handleTogglePause = () => fetchDags();
  const selectDag = (id) => { setSelectedDag(prev => prev === id ? null : id); setSelectedRun(null); };

  const ackAlert = async (id) => {
    await apiFetch(`${BASE}/sla-alerts/${id}/ack`, { method: 'POST' });
    refreshAlerts();
  };

  if (authed === null) return null;
  if (authed === false) return <LoginScreen onLogin={handleLogin} />;

  return (
    <>
      <header>
        <h1>✈ Airflow Node</h1>
        <Health />
        <button className="refresh-btn" style={{marginLeft:'auto'}} onClick={() => setShowKeys(v => !v)}
          title="API Keys">🔑</button>
        <button className="refresh-btn" onClick={handleLogout}
          title="Sign out">⏻</button>
      </header>
      <SlaBanner alerts={alerts} onViewAlerts={() => setShowAlerts(true)} />
      <div className="container">
        {showKeys && <ApiKeysPanel onClose={() => setShowKeys(false)} />}
        {showAlerts && (
          <SlaPanel alerts={alerts} onAck={ackAlert} onClose={() => setShowAlerts(false)} />
        )}
        <div className="section-title">Dags ({dags.length})</div>
        <div className="dag-grid">
          {dags.map(d => (
            <DagCard key={d.id} dag={d}
              selected={selectedDag === d.id}
              onTrigger={handleTrigger}
              onTogglePause={handleTogglePause}
              onSelect={selectDag} />
          ))}
          {!dags.length && <div className="empty">No Dags loaded</div>}
        </div>

        {selectedDag && (
          <>
            <StatsPanel dagId={selectedDag} />
            <BackfillPanel dagId={selectedDag}
              hasSchedule={!!(dags.find(d => d.id === selectedDag)?.schedule)} />
            <div className="split">
              <div>
                <div className="section-title" style={{marginBottom:8}}>
                  Runs — {selectedDag}
                </div>
                <RunsTable dagId={selectedDag} onSelectRun={setSelectedRun} />
              </div>
              {selectedRun && (
                <RunDetail runId={selectedRun} onClose={() => setSelectedRun(null)} />
              )}
            </div>
          </>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

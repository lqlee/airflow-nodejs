<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airflow Node</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    header { background: #1a1d27; border-bottom: 1px solid #2d3748; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; font-weight: 600; color: #63b3ed; }
    .workers-badge { font-size: 12px; background: #2d3748; padding: 3px 10px; border-radius: 12px; color: #a0aec0; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: #718096; margin-bottom: 12px; }
    .dag-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .dag-card { background: #1a1d27; border: 1px solid #2d3748; border-radius: 8px; padding: 16px; transition: border-color .15s; }
    .dag-card.paused { border-color: #744210; background: #1a1812; }
    .dag-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .paused-badge { font-size: 10px; font-weight: 600; background: #744210; color: #fbd38d; padding: 1px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: .04em; }
    .dag-meta { font-size: 12px; color: #718096; margin-bottom: 12px; }
    .tasks-list { font-size: 12px; color: #a0aec0; margin-bottom: 12px; }
    .tasks-list span { background: #2d3748; padding: 2px 7px; border-radius: 4px; margin-right: 4px; display: inline-block; margin-bottom: 4px; }
    .btn { padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: #3182ce; color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-pause { background: #744210; color: #fbd38d; }
    .btn-resume { background: #1c4532; color: #68d391; }
    .runs-table { width: 100%; border-collapse: collapse; }
    .runs-table th { text-align: left; font-size: 12px; color: #718096; font-weight: 500; padding: 8px 12px; border-bottom: 1px solid #2d3748; }
    .runs-table td { padding: 10px 12px; border-bottom: 1px solid #1e2130; font-size: 13px; }
    .runs-table tr:hover td { background: #1e2130; }
    .badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-success { background: #1c4532; color: #68d391; }
    .badge-failed  { background: #4a1515; color: #fc8181; }
    .badge-running { background: #1a365d; color: #63b3ed; }
    .badge-queued  { background: #2d3748; color: #a0aec0; }
    .run-detail { margin-top: 24px; background: #1a1d27; border: 1px solid #2d3748; border-radius: 8px; padding: 20px; }
    .run-detail h3 { font-size: 14px; margin-bottom: 16px; }
    .task-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #1e2130; }
    .task-row:last-child { border-bottom: none; }
    .task-name { font-size: 13px; min-width: 140px; font-family: monospace; }
    .task-deps { font-size: 11px; color: #718096; flex: 1; }
    .duration { font-size: 11px; color: #718096; min-width: 60px; text-align: right; }
    .error-msg { font-size: 11px; color: #fc8181; margin-top: 4px; font-family: monospace; }
    .refresh-btn { background: none; border: 1px solid #2d3748; color: #718096; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .refresh-btn:hover { border-color: #4a5568; color: #a0aec0; }
    .empty { color: #4a5568; font-size: 13px; padding: 24px 0; text-align: center; }
    .dag-filter { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-btn { background: #2d3748; border: 1px solid #4a5568; color: #a0aec0; padding: 4px 12px; border-radius: 14px; cursor: pointer; font-size: 12px; }
    .filter-btn.active { background: #3182ce; border-color: #3182ce; color: #fff; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .split { grid-template-columns: 1fr; } }
    .log-panel { margin-top: 16px; background: #0d1117; border: 1px solid #2d3748; border-radius: 6px; }
    .log-panel-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid #2d3748; font-size: 12px; color: #718096; }
    .log-panel-header strong { color: #a0aec0; font-family: monospace; }
    .log-lines { padding: 10px 12px; max-height: 280px; overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.6; }
    .log-line { display: flex; gap: 12px; }
    .log-ts { color: #4a5568; white-space: nowrap; flex-shrink: 0; }
    .log-stdout { color: #e2e8f0; }
    .log-stderr { color: #fbb6ce; }
    .log-btn { background: none; border: 1px solid #2d3748; color: #718096; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    .log-btn:hover { border-color: #4a5568; color: #a0aec0; }
  </style>
</head>
<body>
<div id="root"></div>
<style>
  .login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login-box { background:#1a1d27; border:1px solid #2d3748; border-radius:10px; padding:36px 32px; width:360px; }
  .login-box h2 { color:#63b3ed; margin-bottom:6px; font-size:20px; }
  .login-box p { color:#718096; font-size:13px; margin-bottom:24px; }
  .login-box input { width:100%; background:#0f1117; border:1px solid #4a5568; border-radius:6px; padding:10px 12px; color:#e2e8f0; font-size:13px; font-family:monospace; outline:none; }
  .login-box input:focus { border-color:#3182ce; }
  .login-box button { width:100%; margin-top:12px; }
  .login-error { color:#fc8181; font-size:12px; margin-top:8px; }
</style>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const BASE = '';
const LS_KEY = 'airflow_api_key';

// ── Auth-aware fetch ──────────────────────────────────────────────────
function apiFetch(url, options = {}) {
  const key = localStorage.getItem(LS_KEY) ?? '';
  return fetch(url, {
    ...options,
    headers: { ...(options.headers ?? {}), ...(key ? { Authorization: `Bearer ${key}` } : {}) },
  });
}

// ── Login screen ──────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [key, setKey] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (!key.trim()) return;
    setLoading(true);
    setError('');
    const res = await fetch(`${BASE}/dags`, {
      headers: { Authorization: `Bearer ${key.trim()}` }
    });
    setLoading(false);
    if (res.status === 401) { setError('Invalid API key'); return; }
    localStorage.setItem(LS_KEY, key.trim());
    onLogin();
  };

  return (
    <div className="login-wrap">
      <div className="login-box">
        <h2>✈ Airflow Node</h2>
        <p>Enter your API key to continue</p>
        <form onSubmit={submit}>
          <input type="password" placeholder="API key" value={key}
            onChange={e => setKey(e.target.value)} autoFocus />
          {error && <div className="login-error">{error}</div>}
          <button className="btn btn-primary" disabled={loading} style={{marginTop:12,width:'100%'}}>
            {loading ? 'Checking…' : 'Sign in'}
          </button>
        </form>
      </div>
    </div>
  );
}

const statusBadge = (state) => <span className={`badge badge-${state}`}>{state}</span>;

const duration = (start, end) => {
  if (!start) return '-';
  const ms = new Date(end ?? Date.now()) - new Date(start);
  return ms < 1000 ? `${ms}ms` : `${(ms/1000).toFixed(1)}s`;
};

function useInterval(fn, ms) {
  useEffect(() => {
    fn();
    const id = setInterval(fn, ms);
    return () => clearInterval(id);
  }, [fn, ms]);
}

// ── Health ────────────────────────────────────────────────────────────
function Health() {
  const [info, setInfo] = useState(null);
  const fetch_ = useCallback(() =>
    apiFetch(`${BASE}/health`).then(r => r.json()).then(setInfo).catch(()=>{}), []);
  useInterval(fetch_, 3000);
  if (!info) return null;
  return (
    <span className="workers-badge">
      workers: {info.workers?.active ?? 0} active · {info.workers?.queued ?? 0} waiting
    </span>
  );
}

// ── Dag Cards ─────────────────────────────────────────────────────────
function DagCard({ dag, onTrigger, onSelect, onTogglePause, selected }) {
  const [triggering, setTriggering] = useState(false);
  const [toggling, setToggling] = useState(false);

  const trigger = async () => {
    setTriggering(true);
    await apiFetch(`${BASE}/dags/${dag.id}/trigger`, { method: 'POST' });
    setTriggering(false);
    onTrigger();
  };

  const togglePause = async () => {
    setToggling(true);
    const action = dag.is_paused ? 'resume' : 'pause';
    await apiFetch(`${BASE}/dags/${dag.id}/${action}`, { method: 'POST' });
    setToggling(false);
    onTogglePause();
  };

  return (
    <div className={`dag-card${dag.is_paused ? ' paused' : ''}`}
      style={{ borderColor: selected && !dag.is_paused ? '#3182ce' : undefined }}>
      <h3>
        {dag.id}
        {dag.is_paused && <span className="paused-badge">paused</span>}
      </h3>
      <div className="dag-meta">
        {dag.schedule ? `⏰ ${dag.schedule}` : '● manual only'}
      </div>
      <div className="tasks-list">
        {dag.tasks.map(t => <span key={t}>{t}</span>)}
      </div>
      <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
        <button className="btn btn-primary btn-sm" onClick={trigger} disabled={triggering}>
          {triggering ? '…' : '▶ Trigger'}
        </button>
        <button className={`btn btn-sm ${dag.is_paused ? 'btn-resume' : 'btn-pause'}`}
          onClick={togglePause} disabled={toggling}>
          {toggling ? '…' : dag.is_paused ? '▶ Resume' : '⏸ Pause'}
        </button>
        <button className="btn btn-sm" style={{background:'#2d3748',color:'#a0aec0'}}
          onClick={() => onSelect(dag.id)}>
          {selected ? 'Hide runs' : 'View runs'}
        </button>
      </div>
    </div>
  );
}

// ── Log Panel ─────────────────────────────────────────────────────────
function LogPanel({ runId, taskId, onClose }) {
  const [lines, setLines] = useState([]);
  const fetch_ = useCallback(() =>
    apiFetch(`${BASE}/dag-runs/${runId}/tasks/${taskId}/logs`)
      .then(r => r.json()).then(setLines).catch(() => {}), [runId, taskId]);
  useInterval(fetch_, 2000);
  const fmt = ts => new Date(ts).toLocaleTimeString('en', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  return (
    <div className="log-panel">
      <div className="log-panel-header">
        <strong>{taskId}</strong> logs
        <span style={{flex:1}} />
        <button className="log-btn" onClick={fetch_}>↻</button>
        <button className="log-btn" onClick={onClose}>✕</button>
      </div>
      <div className="log-lines">
        {lines.length === 0 && <span style={{color:'#4a5568'}}>No logs yet</span>}
        {lines.map((l, i) => (
          <div key={i} className="log-line">
            <span className="log-ts">{fmt(l.ts)}</span>
            <span className={l.stream === 'stderr' ? 'log-stderr' : 'log-stdout'}>{l.line}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Run Detail ────────────────────────────────────────────────────────
function RunDetail({ runId, onClose }) {
  const [run, setRun] = useState(null);
  const [logTask, setLogTask] = useState(null);
  const fetch_ = useCallback(() =>
    apiFetch(`${BASE}/dag-runs/${runId}`).then(r=>r.json()).then(setRun).catch(()=>{}), [runId]);
  useInterval(fetch_, 2000);
  if (!run) return <div className="run-detail"><div className="empty">Loading…</div></div>;
  return (
    <div className="run-detail">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <h3 style={{flex:1}}>Run: <code style={{fontSize:12}}>{runId.slice(-8)}</code></h3>
        {statusBadge(run.state)}
        <button className="refresh-btn" onClick={fetch_}>↻</button>
        <button className="refresh-btn" onClick={onClose}>✕</button>
      </div>
      {run.tasks.map(t => (
        <div key={t.task_id}>
          <div className="task-row">
            <span className="task-name">{t.task_id}</span>
            {statusBadge(t.state)}
            {t.depends_on?.length > 0 &&
              <span className="task-deps">← {t.depends_on.join(', ')}</span>}
            <span className="duration">{duration(t.started_at, t.ended_at)}</span>
            <button className="log-btn"
              onClick={() => setLogTask(prev => prev === t.task_id ? null : t.task_id)}>
              {logTask === t.task_id ? 'hide logs' : 'logs'}
            </button>
          </div>
          {t.error && <div className="error-msg" style={{padding:'4px 0 4px 140px'}}>{t.error}</div>}
          {logTask === t.task_id &&
            <LogPanel runId={runId} taskId={t.task_id} onClose={() => setLogTask(null)} />}
        </div>
      ))}
    </div>
  );
}

// ── Runs Table ────────────────────────────────────────────────────────
function RunsTable({ dagId, onSelectRun }) {
  const [runs, setRuns] = useState([]);
  const fetch_ = useCallback(() =>
    apiFetch(`${BASE}/dags/${dagId}/runs`).then(r=>r.json()).then(setRuns).catch(()=>{}), [dagId]);
  useInterval(fetch_, 3000);
  if (!runs.length) return <div className="empty">No runs yet</div>;
  return (
    <table className="runs-table">
      <thead><tr>
        <th>Run ID</th><th>State</th><th>Created</th><th></th>
      </tr></thead>
      <tbody>
        {runs.map(r => (
          <tr key={r.run_id}>
            <td><code style={{fontSize:12}}>{r.run_id.slice(-8)}</code></td>
            <td>{statusBadge(r.state)}</td>
            <td style={{color:'#718096'}}>{new Date(r.created_at).toLocaleTimeString()}</td>
            <td><button className="refresh-btn" onClick={() => onSelectRun(r.run_id)}>detail →</button></td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

// ── App ───────────────────────────────────────────────────────────────
function App() {
  const [dags, setDags] = useState([]);
  const [selectedDag, setSelectedDag] = useState(null);
  const [selectedRun, setSelectedRun] = useState(null);
  // null = not checked yet, true = authenticated, false = needs login
  const [authed, setAuthed] = useState(null);

  // On mount: check if auth is required and whether we have a valid key
  useEffect(() => {
    apiFetch(`${BASE}/health`).then(r => r.json()).then(info => {
      if (!info.auth) { setAuthed(true); return; }  // auth disabled — open access
      // Auth enabled — verify stored key works
      const key = localStorage.getItem(LS_KEY);
      if (!key) { setAuthed(false); return; }
      apiFetch(`${BASE}/dags`).then(r => {
        setAuthed(r.status !== 401);
      }).catch(() => setAuthed(false));
    }).catch(() => setAuthed(true));  // if health fails, try anyway
  }, []);

  const handleLogin = () => setAuthed(true);
  const handleLogout = () => { localStorage.removeItem(LS_KEY); setAuthed(false); };

  const fetchDags = useCallback(() =>
    apiFetch(`${BASE}/dags`).then(r=>r.json()).then(setDags).catch(()=>{}), []);

  useInterval(fetchDags, 5000);

  const handleTrigger = () => { if (selectedDag) fetchDags(); };
  const handleTogglePause = () => fetchDags();
  const selectDag = (id) => { setSelectedDag(prev => prev === id ? null : id); setSelectedRun(null); };

  if (authed === null) return null;  // loading
  if (authed === false) return <LoginScreen onLogin={handleLogin} />;

  return (
    <>
      <header>
        <h1>✈ Airflow Node</h1>
        <Health />
        <button className="refresh-btn" style={{marginLeft:'auto'}} onClick={handleLogout}
          title="Sign out">⏻</button>
      </header>
      <div className="container">
        <div className="section-title">Dags ({dags.length})</div>
        <div className="dag-grid">
          {dags.map(d => (
            <DagCard key={d.id} dag={d}
              selected={selectedDag === d.id}
              onTrigger={handleTrigger}
              onTogglePause={handleTogglePause}
              onSelect={selectDag} />
          ))}
          {!dags.length && <div className="empty">No Dags loaded</div>}
        </div>

        {selectedDag && (
          <div className="split">
            <div>
              <div className="section-title" style={{marginBottom:8}}>
                Runs — {selectedDag}
              </div>
              <RunsTable dagId={selectedDag} onSelectRun={setSelectedRun} />
            </div>
            {selectedRun && (
              <RunDetail runId={selectedRun} onClose={() => setSelectedRun(null)} />
            )}
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
